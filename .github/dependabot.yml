version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
      time: "00:00"
      timezone: "UTC"
    reviewers:
        - Shopify/core-build-learn
    labels:
      - "Pip upgrades"
    open-pull-requests-limit: 100
    registries: '*'
